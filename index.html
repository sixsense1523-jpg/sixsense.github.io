<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>บัญชีเสียง — FinVoice</title>
<script src="https://cloudflare.com"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --income: #22d3a5;
    --expense: #f87171;
    --accent: #818cf8;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; position: sticky; top: 0; background: var(--bg); z-index: 50; }
  .topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .topbar h1 span { color: var(--accent); }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 14px; }
  .month-nav button:hover { color: var(--text); }
  .month-label { font-size: 14px; font-weight: 600; color: var(--text); min-width: 100px; text-align: center; }

  .tabs { display: flex; padding: 0 20px; gap: 6px; margin-bottom: 4px; }
  .tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; border: none; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--accent); color: #fff; }

  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 20px; }
  .summary-full { grid-column: 1 / -1; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .card-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .card-val.income { color: var(--income); }
  .card-val.expense { color: var(--expense); }
  .card-val.net.pos { color: var(--income); }
  .card-val.net.neg { color: var(--expense); }
  .card-val.net.zero { color: var(--muted); }
  .net-row { display: flex; justify-content: space-between; align-items: center; }

  .voice-section { padding: 0 20px 12px; }
  .voice-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .voice-card h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .mic-btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: all 0.2s; margin: 0 auto 12px; }
  .mic-btn.idle { background: var(--surface2); border: 2px solid var(--border); }
  .mic-btn.recording { background: #ef4444; border: 2px solid #fca5a5; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }
  .voice-hint { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 18px; }
  .transcript-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); min-height: 40px; margin-bottom: 10px; line-height: 1.5; }
  .text-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .text-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }
  .parse-btn { background: var(--accent); border: none; color: #fff; border-radius: var(--radius-sm); padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .parse-btn:hover { opacity: 0.9; }

  .preview-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: none; }
  .preview-card.visible { display: block; }
  .preview-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .preview-row:last-child { margin-bottom: 0; }
  .preview-key { color: var(--muted); }
  .preview-val { font-weight: 600; color: var(--text); }
  .type-badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .type-badge.income { background: rgba(34,211,165,0.15); color: var(--income); }
  .type-badge.expense { background: rgba(248,113,113,0.15); color: var(--expense); }
  .confirm-btn { width: 100%; background: var(--income); border: none; color: #0f172a; border-radius: var(--radius-sm); padding: 11px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .confirm-btn.expense-confirm { background: var(--expense); }

  .list-section { padding: 0 20px 100px; }
  .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .list-header h2 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .filter-row { display: flex; gap: 6px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .filter-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .entry-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .entry-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .entry-icon.income { background: rgba(34,211,165,0.12); }
  .entry-icon.expense { background: rgba(248,113,113,0.12); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .entry-amount.income { color: var(--income); }
  .entry-amount.expense { color: var(--expense); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; font-size: 16px; }
  .del-btn:hover { color: var(--expense); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

  .chart-section { padding: 0 20px 100px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-wrap { position: relative; }
  .cat-list { margin-top: 8px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .cat-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; background: var(--expense); transition: width 0.5s; }
  .cat-bar.income { background: var(--income); }
  .cat-name { width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-pct { width: 35px; text-align: right; color: var(--muted); font-size: 12px; }
  .cat-val { width: 70px; text-align: right; font-weight: 600; }

  .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(30,41,59,0.95); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; padding: 8px 12px; z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-size: 11px; font-weight: 500; padding: 6px 0; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn span { font-size: 20px; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #334155; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); border: 1px solid var(--border); white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .page { display: none; }
  .page.active { display: block; }
  .section-divider { height: 1px; background: var(--border); margin: 8px 20px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Fin<span>Voice</span></h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="tabs" style="margin-top: 4px; padding: 0 20px;">
  <button class="tab" id="tabWeek" onclick="changeViewType('week')">สัปดาห์นี้</button>
  <button class="tab active" id="tabMonth" onclick="changeViewType('month')">เดือนนี้</button>

});

// ===== INIT =====
setupVoice();
seedIfEmpty();
updateMonthLabel();
renderAll();
</script>
</body>
</html>
